<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>How to Build a multimedia Player</h1>
    <section>
        <h2>Dont Lemme Down</h2>
        <audio controls aria-label="tomenting song">
            <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3" type="audio/mp3" >
        </audio>
    </section>
    <section>
        <h2>my wall back</h2>
        <video controls width="600" src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="video/mp4">
            <track src="ttps://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt" kind="track/vtt" srclang="english" label="written in english">
        </video>
    </section>
    <section>
        <h2>transcript</h2>
        <p>see the transcript</p>
    </section>
</body>
</html>
