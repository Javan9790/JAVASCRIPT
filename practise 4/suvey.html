<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suvey Form</title>
</head>
<body>
    <h1 id="title">Suvey Form</h1>
    <p id="description">please fill out</p>
    <form id="survey-form">
        <label id="name-label" for="name">name</label>
        <input type="text" id="name" name="name" required placeholder="Enter your full-name" >
         <label id="email-label" for="email">email</label>
        <input type="email" id="email" name="email" required placeholder="eg example@gmail.com" >
         <label id="number-label" for="number">age</label>
        <input type="number" id="number" min="4" max="115" name="age" required placeholder="in numerical" >
        <label for="dropdown">Choose an option:</label>
        <select id="dropdown" name="dropdown">
            <option value="option 1">option 1</option>
            <option value="option 2"> option 2</option>
        </select> 
        <label> <input type="radio" value="option 1" name="preference">option 1</label>
        <label><input type="radio" value="option 2" name="preference">option 2</label>  
        <label><input type="checkbox" name="hobbies" value="crafting">crafting</label> 
        <label><input type="checkbox" name="hobbies" value="reading">reading</label>
        <label for="comments">Add a comment here: <textarea id="comments" name="comments" rows="5" cols="43" placeholder="comment here">comment</textarea></label>
        <button id="submit" type="submit">submit</button>
</label>
       

        
    </form>                       
</body>
</html>
