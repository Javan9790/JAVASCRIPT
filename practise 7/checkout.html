<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page</title>
</head>
<body>
  <h1>Checkout</h1>  
  <section>
    <h2>Your Cart</h2>
    <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="cubepicture">

  </section>
  <section>
    <h2>Payment Information</h2>
    <form>
        <label for="card-name">Name  <span aria-hidden="true">*</span></label>
        <input type="text" id="card-name" name="card-name" required>
        
         
        <label for="card-number"> card-number<span aria-hidden="true" >*</span></label>
            <input type="text" id="card-number" name="card-number" name="card-number" required aria-describedby="card-number-help">
           
        <p id="card-number-help" >Enter the number here</p>
        <button id="submit" type="submit">submit</button>
         </form>

  </section>
</body>
</html>
