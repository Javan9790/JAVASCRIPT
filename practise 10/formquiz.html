<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body{font-family: sans-serif;
            padding: 20px; line-height: 1.6;}
        .form-group{
            margin-bottom: 15px;}
            .row{display: flex; gap: 20px; margin-bottom: 15px;}
 .row div{
    flex: 1; }
 input[type="text"], input[type="tel"]{
    width: 100; padding: 5px; margin-top: 20px;
 }label {font-weight: bold;}
 .buttons {margin-top: 20px; padding: 5px; width: 100;}
 </style>
</head>
<body>
   <form>
   <dv class="form-group"> <label for="fullName">full name:</label><br>
    <input type="text" id="fullName" name="fullName" size="50"></dv>
 <div class="row"> <div>
    <label for="parentsName">parents name:</label>
    <input type="text" id="parentsName" name="parentsName">
    <label for="parentsPhone">parents phoneNo:</label>
    <input type="tel" id="parentsPhone" name="parentsPhone"></div></div>
<div class="form-group">
<label for="classEnrolled">class enrolled:</label>
<input type="text" id="classEnrolled" name="classEnrolled"></div>
<div class="row"><div>
<label for="grade">Grade:</label>
<input type="text" id="grade" name="grade">
<label for="class_year">class year</label>
<input type="text" id="class_year" name="class_year">
</div></div>
<div class="buttons">
<input type="submit" value="submit">
<input type="reset" value="reset">
</div>
   </form> 
</body>
</html>
